<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#fafaf8">
<title>my heart</title>
<link rel="manifest" href="manifest.json">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafaf8;
    --surface: #ffffff;
    --border: #e8e6e1;
    --border-light: #f0eeea;
    --text: #1a1a16;
    --text-secondary: #7a7872;
    --text-tertiary: #b0aea8;
    --accent: #1a1a16;
    --accent-subtle: #f3f2ee;
    --done: #8c8880;
    --radius: 8px;
    --radius-lg: 12px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .app {
    width: 100%;
    max-width: 480px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 0 20px;
  }

  /* ── Header ── */
  .header {
    padding: 40px 0 24px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 520;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  .header .date-str {
    font-size: 13px;
    color: var(--text-tertiary);
    margin-top: 4px;
    font-weight: 430;
  }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .tabs button {
    padding: 10px 18px 10px 0;
    border: none;
    background: transparent;
    font-size: 14px;
    font-weight: 460;
    color: var(--text-tertiary);
    cursor: pointer;
    transition: color 0.2s;
    position: relative;
    letter-spacing: -0.2px;
  }
  .tabs button + button { padding-left: 18px; }
  .tabs button::after {
    content: "";
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 18px;
    height: 1.5px;
    background: var(--accent);
    transform: scaleX(0);
    transition: transform 0.2s;
  }
  .tabs button.active {
    color: var(--text);
    font-weight: 520;
  }
  .tabs button.active::after {
    transform: scaleX(1);
  }
  .tabs button + button::after { right: 18px; left: 18px; }

  /* ── Tab content ── */
  .tab-content { display: none; flex-direction: column; gap: 8px; padding-bottom: 40px; }
  .tab-content.active { display: flex; }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 16px;
    border: 1px solid var(--border-light);
  }

  /* ── Task item ── */
  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border-light);
  }
  .task-item:last-child { border-bottom: none; }
  .task-item.done .task-text { text-decoration: line-through; color: var(--done); }

  .task-check {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 2px;
    background: var(--surface);
  }
  .task-check svg { opacity: 0; transition: opacity 0.15s; }
  .task-check.checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .task-check.checked svg { opacity: 1; }

  .task-body { flex: 1; min-width: 0; }
  .task-text {
    font-size: 15px;
    line-height: 1.55;
    word-break: break-word;
    font-weight: 440;
  }

  .task-eval {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .task-eval input {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 10px;
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border 0.2s;
  }
  .task-eval input:focus { border-color: var(--text-secondary); }
  .task-eval input::placeholder { color: var(--text-tertiary); }

  .eval-dots {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .eval-dots span.eval-label {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-right: 4px;
    width: 28px;
  }
  .eval-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--border);
    cursor: pointer;
    transition: all 0.15s;
  }
  .eval-dot.active { background: var(--accent); }
  .eval-dot:active { transform: scale(1.4); }

  .task-del {
    width: 28px; height: 28px;
    border: none; background: none;
    font-size: 18px; color: var(--text-tertiary);
    cursor: pointer;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    opacity: 0;
    line-height: 1;
  }
  .task-item:hover .task-del,
  .task-del:focus-visible { opacity: 1; }
  .task-del:active { background: var(--accent-subtle); color: var(--text); }

  /* ── Add form ── */
  .add-form {
    display: flex;
    gap: 8px;
    margin-bottom: 4px;
  }
  .add-form input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    font-size: 15px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border 0.2s;
    font-weight: 440;
  }
  .add-form input:focus { border-color: var(--text-secondary); }
  .add-form input::placeholder { color: var(--text-tertiary); }
  .add-form button {
    padding: 10px 18px;
    border: none;
    border-radius: var(--radius);
    background: var(--accent);
    color: #fafaf8;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
    letter-spacing: -0.2px;
  }
  .add-form button:active { opacity: 0.8; }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-tertiary);
  }
  .empty p { font-size: 14px; line-height: 1.8; font-weight: 430; }

  /* ── Section label ── */
  .section-hint {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-bottom: 6px;
    font-weight: 440;
  }

  /* ── I TALK ── */
  .italk-entry {
    padding: 18px;
    border-radius: var(--radius-lg);
    margin-bottom: 8px;
    border: 1px solid var(--border-light);
    background: var(--surface);
  }
  .italk-meta {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-bottom: 10px;
    font-weight: 450;
  }
  .italk-text {
    font-size: 15px;
    line-height: 1.75;
    white-space: pre-wrap;
    word-break: break-word;
    font-weight: 440;
  }
  .italk-textarea {
    width: 100%;
    min-height: 140px;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px;
    font-size: 15px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
    resize: vertical;
    outline: none;
    line-height: 1.75;
    transition: border 0.2s;
    font-weight: 440;
  }
  .italk-textarea:focus { border-color: var(--text-secondary); }
  .italk-textarea::placeholder { color: var(--text-tertiary); }

  .italk-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    justify-content: flex-end;
  }
  .btn-save {
    padding: 8px 20px;
    border: none;
    border-radius: var(--radius);
    background: var(--accent);
    color: #fafaf8;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
    letter-spacing: -0.2px;
  }
  .btn-save:active { opacity: 0.8; }
  .btn-clear {
    padding: 8px 20px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text-secondary);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 440;
  }
  .btn-clear:active { background: var(--accent-subtle); }
  .btn-del-entry {
    background: none;
    border: none;
    color: var(--text-tertiary);
    font-size: 12px;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    margin-top: 10px;
    transition: all 0.15s;
  }
  .btn-del-entry:active { background: var(--accent-subtle); color: var(--text); }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 0 12px;
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    padding: 20px 0 32px;
    font-size: 12px;
    color: var(--text-tertiary);
    margin-top: auto;
    letter-spacing: -0.2px;
    font-weight: 440;
  }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <h1>my heart</h1>
    <div class="date-str" id="dateDisplay"></div>
  </header>

  <nav class="tabs">
    <button data-tab="today" class="active">今日</button>
    <button data-tab="tomorrow">明日</button>
    <button data-tab="italk">I TALK</button>
  </nav>

  <section class="tab-content active" id="tab-today"></section>
  <section class="tab-content" id="tab-tomorrow"></section>
  <section class="tab-content" id="tab-italk"></section>

  <div class="footer">my heart</div>
</div>

<svg style="display:none" aria-hidden="true">
  <symbol id="check" viewBox="0 0 12 12">
    <path d="M2.5 6L5 8.5L9.5 3.5" stroke="#fafaf8" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>
</svg>

<script>
const STORAGE_KEY = "my-heart-data";

function load() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) return JSON.parse(raw);
  return {
    todayTasks: [],
    tomorrowTasks: [],
    iTalkEntries: [],
    lastMigrationDate: null
  };
}

function save(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function formatDate(str) {
  const d = new Date(str);
  const w = ["日","一","二","三","四","五","六"];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 星期${w[d.getDay()]}`;
}

function formatTime(ts) {
  const d = new Date(ts);
  return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}

function checkMigration(data) {
  const today = todayStr();
  if (data.lastMigrationDate === today) return;
  if (data.lastMigrationDate && data.tomorrowTasks.length > 0) {
    const migrated = data.tomorrowTasks.map((t) => ({
      id: uid(),
      text: t.text,
      done: false,
      evaluation: "",
      stars: 0,
      date: today
    }));
    data.todayTasks = [...migrated, ...data.todayTasks];
    data.tomorrowTasks = [];
  }
  data.lastMigrationDate = today;
  save(data);
}

let appData = load();
checkMigration(appData);

/* ── Today Tab ── */
function renderToday() {
  const el = document.getElementById("tab-today");
  const tasks = appData.todayTasks;

  let html = `
    <form class="add-form" onsubmit="return addToday(event)">
      <input type="text" id="todayInput" placeholder="添加今日事项" autocomplete="off">
      <button type="submit">添加</button>
    </form>
  `;

  if (!tasks.length) {
    html += `<div class="empty"><p>暂无今日事项</p></div>`;
  } else {
    html += tasks.map((t, i) => `
      <div class="card task-item ${t.done ? "done" : ""}">
        <div class="task-check ${t.done ? "checked" : ""}" onclick="toggleToday(${i})">
          <svg width="12" height="12"><use href="#check"/></svg>
        </div>
        <div class="task-body">
          <div class="task-text">${esc(t.text)}</div>
          ${t.done ? renderEval(t, i) : ""}
        </div>
        <button class="task-del" onclick="delToday(${i})" title="删除">&times;</button>
      </div>`).join("");
  }

  el.innerHTML = html;
}

function renderEval(t, i) {
  return `
    <div class="task-eval">
      <div class="eval-dots">
        <span class="eval-label">效率</span>
        ${[1,2,3,4,5].map(v => `<div class="eval-dot${v <= t.stars ? " active" : ""}" onclick="rateToday(${i}, ${v})"></div>`).join("")}
      </div>
      <input type="text" placeholder="备注…" value="${escAttr(t.evaluation || "")}" onchange="evalToday(${i}, this.value)">
    </div>`;
}

function esc(s) {
  const div = document.createElement("div");
  div.textContent = s;
  return div.innerHTML;
}

function escAttr(s) {
  return s.replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function addToday(e) {
  e.preventDefault();
  const inp = document.getElementById("todayInput");
  const text = inp.value.trim();
  if (!text) return;
  appData.todayTasks.unshift({ id: uid(), text, done: false, evaluation: "", stars: 0, date: todayStr() });
  save(appData);
  renderToday();
  inp.value = "";
}

function toggleToday(i) {
  appData.todayTasks[i].done = !appData.todayTasks[i].done;
  if (!appData.todayTasks[i].done) { appData.todayTasks[i].evaluation = ""; appData.todayTasks[i].stars = 0; }
  save(appData);
  renderToday();
}

function rateToday(i, stars) {
  appData.todayTasks[i].stars = stars;
  save(appData);
  renderToday();
}

function evalToday(i, val) {
  appData.todayTasks[i].evaluation = val.trim();
  save(appData);
}

function delToday(i) {
  if (!confirm("删除？")) return;
  appData.todayTasks.splice(i, 1);
  save(appData);
  renderToday();
}

window.addToday = addToday;
window.toggleToday = toggleToday;
window.rateToday = rateToday;
window.evalToday = evalToday;
window.delToday = delToday;

/* ── Tomorrow Tab ── */
function renderTomorrow() {
  const el = document.getElementById("tab-tomorrow");
  const tasks = appData.tomorrowTasks;

  let html = `
    <div class="section-hint">次日打开时，内容自动移至「今日」</div>
    <form class="add-form" onsubmit="return addTomorrow(event)">
      <input type="text" id="tomorrowInput" placeholder="添加明日计划" autocomplete="off">
      <button type="submit">添加</button>
    </form>
  `;

  if (!tasks.length) {
    html += `<div class="empty"><p>暂无明日计划</p></div>`;
  } else {
    html += tasks.map((t, i) => `
      <div class="card task-item">
        <div class="task-check" style="visibility:hidden">
          <svg width="12" height="12"><use href="#check"/></svg>
        </div>
        <div class="task-body"><div class="task-text">${esc(t.text)}</div></div>
        <button class="task-del" onclick="delTomorrow(${i})" title="删除">&times;</button>
      </div>`).join("");
  }

  el.innerHTML = html;
}

function addTomorrow(e) {
  e.preventDefault();
  const inp = document.getElementById("tomorrowInput");
  const text = inp.value.trim();
  if (!text) return;
  appData.tomorrowTasks.unshift({ id: uid(), text, createdAt: Date.now() });
  save(appData);
  renderTomorrow();
  inp.value = "";
}

function delTomorrow(i) {
  if (!confirm("删除？")) return;
  appData.tomorrowTasks.splice(i, 1);
  save(appData);
  renderTomorrow();
}

window.addTomorrow = addTomorrow;
window.delTomorrow = delTomorrow;

/* ── I TALK Tab ── */
function renderITalk() {
  const el = document.getElementById("tab-italk");
  const entries = appData.iTalkEntries;

  let html = `
    <textarea class="italk-textarea" id="italkInput" placeholder="与自己对话。

今天什么让我感到痛苦？
这种情绪的根源是什么？
我真正害怕的是什么？"></textarea>
    <div class="italk-actions">
      <button class="btn-clear" onclick="clearITalk()">清空</button>
      <button class="btn-save" onclick="saveITalk()">记录此刻</button>
    </div>
    <hr class="divider">
  `;

  if (!entries.length) {
    html += `<div class="empty"><p>暂无记录</p></div>`;
  } else {
    html += [...entries].reverse().map((e) => `
      <div class="italk-entry">
        <div class="italk-meta">${formatDate(e.date)} &nbsp;${formatTime(e.timestamp)}</div>
        <div class="italk-text">${esc(e.content)}</div>
        <button class="btn-del-entry" onclick="delITalk('${e.id}')">删除</button>
      </div>`).join("");
  }

  el.innerHTML = html;
}

function saveITalk() {
  const textarea = document.getElementById("italkInput");
  const content = textarea.value.trim();
  if (!content) return;
  appData.iTalkEntries.push({ id: uid(), content, date: todayStr(), timestamp: Date.now(), type: "q" });
  save(appData);
  renderITalk();
}

function clearITalk() { document.getElementById("italkInput").value = ""; }

function delITalk(id) {
  if (!confirm("删除这条记录？")) return;
  appData.iTalkEntries = appData.iTalkEntries.filter((e) => e.id !== id);
  save(appData);
  renderITalk();
}

window.saveITalk = saveITalk;
window.clearITalk = clearITalk;
window.delITalk = delITalk;

/* ── Tab Switching ── */
document.querySelectorAll(".tabs button").forEach((btn) => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tabs button").forEach((b) => b.classList.remove("active"));
    btn.classList.add("active");
    document.querySelectorAll(".tab-content").forEach((s) => s.classList.remove("active"));
    document.getElementById("tab-" + btn.dataset.tab).classList.add("active");
    const inputs = { today: "todayInput", tomorrow: "tomorrowInput", italk: "italkInput" };
    setTimeout(() => document.getElementById(inputs[btn.dataset.tab])?.focus(), 200);
  });
});

/* ── Init ── */
renderToday();
renderTomorrow();
renderITalk();
document.getElementById("dateDisplay").textContent = formatDate(todayStr());

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>
</body>
</html>
